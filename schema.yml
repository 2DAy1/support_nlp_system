      tags:
      - schema
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/tickets/:
    post:
      operationId: tickets_create
      description: Creates ticket from external source, classifies by NLP, routes
        to department.
      summary: Create support ticket
      parameters:
      - in: header
        name: X-API-Key
        schema:
          type: string
        required: true
      tags:
      - tickets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TicketCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TicketCreateRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketCreateResponse'
          description: Ticket created.
components:
  schemas:
    ClassifyRequest:
      type: object
      properties:
        title:
          type: string
        text:
          type: string
    ClassifyResponse:
      type: object
      properties:
        predicted_category:
          type: string
        confidence:
          type: number
          format: double
      required:
      - confidence
      - predicted_category
    TicketCreateRequest:
      type: object
      properties:
        source:
          type: string
        external_id:
          type: string
        author_name:
          type: string
        author_email:
          type: string
          format: email
        rating:
          type: integer
          maximum: 5
          minimum: 1
        title:
          type: string
        text:
          type: string
      required:
      - text
      - title
    TicketCreateResponse:
      type: object
      properties:
        id:
          type: integer
        company:
          type: string
        source:
          type: string
          nullable: true
        title:
          type: string
        category:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        status:
          type: string
        confidence:
          type: number
          format: double
      required:
      - category
      - company
      - confidence
      - department
      - id
      - source
      - status
      - title
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
