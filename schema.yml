openapi: 3.0.3
info:
  title: Support NLP API
  version: 1.0.0
  description: B2B system for automatic support ticket classification and routing.
paths:
  /api/classify/:
    post:
      operationId: classify_create
      description: Classifies text without creating ticket.
      summary: Classify ticket text
      tags:
      - classify
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClassifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClassifyRequest'
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassifyResponse'
          description: Ticket text classified.
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
